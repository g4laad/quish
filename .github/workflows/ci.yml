name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PAM backend needs libpam headers + libclang (bindgen).
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev libpam0g-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (server, --features pam)
        run: cargo clippy -p quish-server --features pam --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace (both binaries)
        run: cargo build --workspace
      - name: Dev-mode e2e
        run: cargo test -p quish-server --test e2e -- --ignored --nocapture

  # Real privilege-separated path (root monitor + chrooted worker + PAM + PTY)
  # exercised in a rootful podman container. Rootful is the reliable path for
  # chroot/setuid, so run under sudo.
  privsep-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build privsep e2e image
        run: sudo podman build -t quish-privsep-e2e -f dist/test/Containerfile .
      - name: Run privsep e2e
        run: sudo podman run --rm quish-privsep-e2e

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # quishd links PAM (real deploy build); needs libpam headers + libclang.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev libpam0g-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release -p quish-server --features pam
          cargo build --release -p quish-client

      - uses: actions/upload-artifact@v4
        with:
          name: quish-linux-x86_64
          path: |
            target/release/quishd
            target/release/quish

      - name: Install packaging tools
        run: cargo install --locked cargo-deb cargo-generate-rpm

      # --no-build/--no-strip: binaries are already built above and stripped by
      # [profile.release] strip = true.
      - name: Build .deb and .rpm
        run: |
          cargo deb --no-build --no-strip -p quish-server
          cargo deb --no-build --no-strip -p quish-client
          cargo generate-rpm -p quish-server
          cargo generate-rpm -p quish-client

      - uses: actions/upload-artifact@v4
        with:
          name: quish-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  # On a v* tag, attach the build job's binaries + packages to a GitHub Release.
  # Package versions come from Cargo.toml, not the tag — bump the crate versions
  # to match before tagging.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # quish-packages keeps target/{debian,generate-rpm}/ subdirs, so glob one
        # level deeper to match files, not the directories.
        run: >
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY" --generate-notes
          artifacts/quish-linux-x86_64/* artifacts/quish-packages/*/*

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        run: |
          cargo install --locked cargo-audit
          # RUSTSEC-2023-0071: rsa is an optional, never-enabled ssh-key dep (see deny.toml).
          cargo audit --ignore RUSTSEC-2023-0071
      - name: cargo-deny
        run: |
          cargo install --locked cargo-deny
          cargo deny check

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Smoke-fuzz the frame decoder
        run: |
          cargo install --locked cargo-fuzz
          cargo +nightly fuzz run decode --fuzz-dir quish-proto/fuzz -- -max_total_time=60
