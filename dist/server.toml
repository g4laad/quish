# quish server configuration. Pass with `quishd --config /etc/quish/server.toml`.
# Every field is optional; a CLI flag of the same name overrides what's here.

# UDP address to listen on. Privileged ports (<1024) are supported: the worker
# binds while still root, then drops privileges.
listen = "[::]:443"

# Secret request path. Any other path returns a generic 404 before quish logic
# runs, so an unknown scanner just sees an ordinary web server.
path = "/quish"

# Unprivileged account the network-facing worker chroots + setuids to.
privsep_user = "quish"

# Empty directory the worker chroots into (systemd RuntimeDirectory=quishd).
privsep_dir = "/run/quishd"

# Persist the host key here so the fingerprint is stable across restarts (clients
# pin it TOFU-style). Generated with 0600 perms on first start.
host_key = "/var/lib/quishd/host_key.der"

# Failed auth attempts tolerated on a single connection before further attempts
# get cheap 401s (no monitor round-trip). The connection stays up and the
# constant-time anti-enumeration floor still applies.
max_auth_fails = 6

# Enable local (`-L`) TCP port forwarding. Forwarding is OFF by default; when
# enabled it is loopback-only — the server will only connect to `127.0.0.0/8` /
# `::1`, so a forward channel cannot pivot to other hosts. Leave unset (or false)
# to refuse all forward channels. Overridden by the `--allow-forward` CLI flag.
# Takes effect in both dev and privsep (daemon) modes, but only when this config
# is actually loaded (`quishd --config /etc/quish/server.toml`).
# allow_forward = false

# Enable remote (`-R`) TCP port forwarding. OFF by default; when enabled the
# server binds a loopback-only listener (`127.0.0.0/8` / `::1`, port >= 1024) and
# forwards each inbound connection back to the client, which dials the client-side
# target — so a remote forward cannot expose a service to non-loopback peers.
# Leave unset (or false) to refuse all remote-forward channels. Overridden by the
# `--allow-remote-forward` CLI flag. Takes effect in both dev and privsep modes.
# allow_remote_forward = false

# Disable the network-facing worker's seccomp-bpf syscall filter. The filter is
# ENFORCING by default (this key defaults to false): after dropping privileges
# the worker may make only its ~50 legitimate syscalls; anything else kills it.
# Set true only as an escape hatch if a kernel/glibc/tokio upgrade makes the
# allowlist SIGSYS-kill the worker — the real fix is re-auditing the allowlist.
# Privsep mode only (dev mode installs no filter). Overridden by `--no-seccomp`.
# no_seccomp = false

# Require a per-user TOTP second factor (RFC 6238) after the password. OFF by
# default. When enabled, each user enrolls a base32 secret (the string an
# authenticator app stores) at ~user/.config/quish/totp; login becomes a
# two-round challenge (password, then one-time code). Needs the `pam` feature for
# the password first factor. Anti-enumeration is preserved: a bogus user is
# challenged identically and every failure is the same floored 401. Overridden by
# the `--totp` CLI flag. Privsep mode only (in dev mode use
# `--dev-insecure-totp-secret <base32>`).
# totp = false
